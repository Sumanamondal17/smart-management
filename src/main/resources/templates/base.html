<!doctype html>
<html
  lang="en"
  th:fragment="parent(content,title,script)"
  xmlns:th="http://www.thymeleaf.org"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />

    <link th:href="@{/output.css}" rel="stylesheet" />
    <link rel="stylesheet" data-th-href="@{style.css}" />
    <title th:replace="${title}">Base Page</title>
  </head>

  <body class="bg-gray-100 dark:bg-gray-900">
    <!--if user is logged in: navbar-->
    <div th:if="${loggedInUser}">
      <div data-th-replace="~{user/user_navbar::user-navbar}"></div>
    </div>

    <!--if user is not logged in-->
    <div th:unless="${loggedInUser}">
      <div data-th-replace="~{navbar::navbar}"></div>
    </div>

    <!--content-->
    <div class="m-4 text-black dark:text-white">
      <section th:replace="${content}"></section>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script data-th-src="@{'/js/script.js'}"></script>
    <th:block data-th-replace="${script}"></th:block>
  </body>
</html>
