<!doctype html>
<html
  lang="en"
  th:replace="~{base::parent(~{::#content},~{::title},~{::script})}"
>
  <head>
    <title data-th-text="${loggedInUser.name}+'| Dashboard'">
      Profile Page
    </title>
  </head>

  <body>
    <div id="content">
      <!--if user is logged in: sidebar-->
      <div th:if="${loggedInUser}">
        <div data-th-replace="~{user/sidebar :: sidebar}"></div>
      </div>
      <div
        class="sm:pl-64 pt-24 px-6 bg-gray-100 dark:bg-gray-900 min-h-screen"
      >
        <!-- Welcome Section -->
        <div class="mb-8">
          <h1 class="text-4xl font-bold text-gray-800 dark:text-white">
            Welcome, <span th:text="${loggedInUser.name}"></span>
          </h1>

          <p class="text-gray-600 dark:text-gray-400 mt-2 text-lg">
            Manage your contacts efficiently and securely.
          </p>
        </div>

        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6">
          <!-- Total Contacts -->
          <div
            class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg dark:shadow-lg dark:shadow-gray-200 dark:hover:shadow-blue-500 p-6 h-58 flex flex-col justify-center items-center hover:scale-105 transition"
          >
            <h2 class="text-lg font-semibold text-gray-500 dark:text-gray-400">
              Total Contacts
            </h2>
            <i class="fa-solid text-blue-600 fa-address-book text-2xl"></i>

            <p
              class="text-5xl font-bold text-blue-600 mt-10"
              th:text="${totalContacts}"
            ></p>
            <p class="text-gray-500 dark:text-gray-400 mt-3 text-sm">
              Your all saved contacts
            </p>
          </div>

          <!-- Favorites -->
          <div
            class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg dark:shadow-lg dark:shadow-gray-200 dark:hover:shadow-pink-500 p-6 h-58 flex flex-col justify-center items-center hover:scale-105 transition"
          >
            <h2 class="text-lg font-semibold text-gray-500 dark:text-gray-400">
              Favorites
            </h2>
            <i class="fa-solid fa-heart text-pink-500 text-2xl"></i>

            <p
              class="text-5xl font-bold text-pink-500 mt-10"
              th:text="${favoriteContacts}"
            ></p>
            <p class="text-gray-500 dark:text-gray-400 mt-3 text-sm">
              Your favourite contacts
            </p>
          </div>
          <!-- Chart Card -->
          <div
            class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg p-6 md:col-span-2"
          >
            <h2 class="text-xl font-bold text-gray-800 dark:text-white mb-4">
              Contacts Overview
            </h2>

            <div class="h-80 flex items-center justify-center">
              <canvas id="contactChart"></canvas>
            </div>
          </div>
        </div>

        <!-- Quick Actions -->
        <div class="mt-10">
          <h2 class="text-2xl font-bold mb-6 text-gray-800 dark:text-white">
            Quick Actions
          </h2>

          <div class="flex flex-wrap gap-4">
            <a
              href="/user/contacts/add"
              class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl shadow-lg transition"
            >
              Add Contact
            </a>

            <a
              href="/user/contacts"
              class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-xl shadow-lg transition"
            >
              View Contacts
            </a>

            <a
              href="/user/profile"
              class="bg-purple-600 hover:bg-purple-700 text-white px-6 py-3 rounded-xl shadow-lg transition"
            >
              My Profile
            </a>
          </div>
        </div>

        <!-- Recent Activity -->
        <div class="mt-12 bg-white dark:bg-gray-800 rounded-2xl shadow-lg p-8">
          <h2 class="text-2xl font-bold mb-6 text-gray-800 dark:text-white">
            Recent Activity
          </h2>

          <div class="space-y-4">
            <div
              th:if="${#lists.isEmpty(recentActivities)}"
              class="text-gray-500 dark:text-gray-400 text-center py-4"
            >
              No recent activity found
            </div>

            <div
              th:each="activity : ${recentActivities}"
              class="flex justify-between border-b border-gray-200 dark:border-gray-700 pb-3"
            >
              <span class="text-gray-700 dark:text-gray-300">
                <span th:text="${activity.action}"></span>
                contact "<span th:text="${activity.contactName}"></span>"
              </span>

              <span
                class="text-sm text-gray-500"
                th:text="${#temporals.format(activity.timestamp,'dd MMM hh:mm a')}"
              >
              </span>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script th:inline="javascript">

            const totalContacts = [[${totalContacts}]];
            const favoriteContacts = [[${favoriteContacts}]];

            const ctx = document.getElementById('contactChart');

            new Chart(ctx, {
                type: 'doughnut',

                data: {
                    labels: ['Total Contacts', 'Favorites'],

                    datasets: [{
                        label: 'Contacts Stats',

                        data: [totalContacts, favoriteContacts],

                        backgroundColor: [
                            '#2563eb',
                            '#ec4899'
                        ],

                        borderRadius: 5
                    }]
                },

                options: {
                    responsive: true,

                    plugins: {
                        legend: {
                            position: 'bottom',

                        labels: {
                            color: 'white',
                            padding: 20,
                            font: {
                                size: 14
                            }
                        }
      }
                    },


                }
            });
    </script>
    <script>
      console.log("dashboard page");
    </script>
  </body>
</html>
