<aside data-th-fragment="sidebar" id="logo-sidebar"
  class="fixed top-0 left-0 z-40 w-64 h-full transition-transform -translate-x-full sm:translate-x-0 bg-gray-200 dark:bg-gray-800"
  aria-label="Sidebar">
  <div class="h-full px-3 py-4 overflow-y-auto border-e border-default">
    <div class="flex flex-col items-center ps-2.5 mb-5">
      <img th:src="${loggedInUser.profilePic != null} 
              ? ${loggedInUser.profilePic}
              : 'https://ui-avatars.com/api/?name=' + ${loggedInUser.name} + '&background=random&color=fff&size=200'"
        class="w-20 h-20 rounded-full border-4 border-white shadow-lg object-cover" alt="Profile" />
      <span data-th-text="${loggedInUser.name}"
        class="self-center text-lg text-heading font-semibold whitespace-nowrap"></span>
    </div>
    <ul class="space-y-2 font-medium">
      <li>
        <a data-th-href="@{'/user/dashboard'}"
          class="flex items-center px-2 py-1.5 text-body rounded-base hover:bg-blue-500 border-2 border-gray-400">
          <svg class="w-5 h-5 transition duration-75 group-hover:text-fg-brand" aria-hidden="true"
            xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M10 6.025A7.5 7.5 0 1 0 17.975 14H10V6.025Z" />
            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M13.5 3c-.169 0-.334.014-.5.025V11h7.975c.011-.166.025-.331.025-.5A7.5 7.5 0 0 0 13.5 3Z" />
          </svg>
          <span class="ms-3">Dashboard</span>
        </a>
      </li>
      <li>
        <a data-th-href="@{'/user/profile'}"
          class="flex items-center px-2 py-1.5 text-body rounded-base hover:bg-blue-500 border-2 border-gray-400">
          <i class="fa-solid fa-user"></i>
          <span class="flex-1 ms-3 whitespace-nowrap">Profile</span>
        </a>
      </li>
      <li>
        <a data-th-href="@{'/user/contacts/add'}"
          class="flex items-center px-2 py-1.5 text-body rounded-base hover:bg-blue-500 border-2 border-gray-400">
          <i class="fa-solid fa-plus"></i>
          <span class="flex-1 ms-3 whitespace-nowrap">Add Contact</span>
        </a>
      </li>
      <li>
        <a data-th-href="@{'/user/contacts'}"
          class="flex items-center px-2 py-1.5 text-body rounded-base hover:bg-blue-500 border-2 border-gray-400">
          <i class="fa-solid fa-address-book"></i>
          <span class="flex-1 ms-3 whitespace-nowrap">Contacts</span>
        </a>
      </li>

      <li>
        <a data-th-href="@{'/logout'}"
          class="flex items-center px-2 py-1.5 text-body rounded-base hover:bg-blue-500 border-2 border-gray-400">
          <svg class="shrink-0 w-5 h-5 transition duration-75 group-hover:text-fg-brand" aria-hidden="true"
            xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M16 12H4m12 0-4 4m4-4-4-4m3-4h2a3 3 0 0 1 3 3v10a3 3 0 0 1-3 3h-2" />
          </svg>
          <span class="flex-1 ms-3 whitespace-nowrap">Logout</span>
        </a>
      </li>
    </ul>
  </div>
</aside>
